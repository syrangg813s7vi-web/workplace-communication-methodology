[book]
title = "职场沟通方法论"
description = "从认知差异到系统化沟通框架"
authors = ["AILV"]
language = "zh"

[build]
build-dir = "../../docs/haiku"

[output.html]
default-theme = "light"
preferred-dark-theme = "light"
mathjax-support = false
copy-fonts = true
no-section-label = false
git-repository-url = "https://github.com/syrangg813s7vi-web/workplace-communication-methodology"
git-repository-icon = "fa-github"

[output.html.search]
enable = true
limit-results = 30
